<div class="{{ name }} baseModuleStyle TrustedbyteamSection  {{ module.custom_style.custom_class }} " id="{{ module.custom_style.section_id }}">
  <span class="baseModuleOverlay"></span>
  <div class="baseModuleParent"> 
    
      {# Custum Width Option #}
      <div class="customWidthOption TrustedbyteamInSec">
        {% if  module.content_group.title  %}
        <div class="moduleTitle TrustedbyteamTitle p3 text-center purple_color " data-aos="fade-in">
          {{ module.content_group.title }}
        </div>
          {% endif %}

        <div class="TrustedbyteamLogoBoxSec {% if  module.content_group.title  %} pt50 {% endif %}" data-aos="fade-in" data-aos-delay="100">
          {% for logo in module.content_group.logo_group %}
          <div class="TrustedbyteamLogoBox"> 
              <div class="TrustedbyteamLogoBoxIn">
                <img src="{{ logo.image.src|escape_url }}" alt="{{ logo.image.alt }}" />
              </div>
          </div>
          {% endfor %}
        </div>  
      </div>
          {# End Custum Width Option #}


  </div>

</div>

    {% require_css %}
    <style>
     {% scope_css %}
      /****  Button Style  *****/
      {% for item in module.content_group.cta_group %}
            {% set CTA = item %}
      {% if CTA.override_button_style %}

      .baseModuleStyle .basebutton-{{ loop.index }} a{
        background:{{ CTA.button_style_group.btn_bg_color.css}};
        color:{{ CTA.button_style_group.btn_text_color.css }};
        border-color:{{ CTA.button_style_group.btn_border_color.css }};
      }

      .baseModuleStyle .basebutton-{{ loop.index }} a:hover {
        background-color:{{ CTA.button_style_group.btn_bg_color_hover.css}};
        color:{{ CTA.button_style_group.btn_text_color_hover.css }};
        border-color : {{ CTA.button_style_group.btn_border_color_hover.css }};
      }

      {% endif %}
      {% endfor %}
      /****  End Button Style  ****/
     {% end_scope_css %}
    </style>
    
   
    <style>

{#       {% scope_css %} #}
        
      {# Desktop Styling #}
      .{{name}}.baseModuleStyle{
        position:relative;
        z-index: 1;
        {{ module.style.spacing.desktop_spacing.css }}
       
        {% if module.style.background_property.background_choice == 'bgImage'  %}
         background-image:url('{{ module.style.background_property.background_image.src|escape_url }}');  background-position: center center;  background-repeat: no-repeat; background-size : cover;
        {% elif module.style.background_property.background_choice == 'bgColor'  %}
        background-color:rgba({{ module.style.background_property.background_color.color|convert_rgb }},{{ module.style.background_property.background_color.opacity }}%);
        {% elif module.style.background_property.background_choice == 'gredient'  %}
        background:{{ module.style.background_property.background_gredient.css }};
        {% endif %}
      } 
      /****  Overlay Start  *****/
      {% if module.style.background_property.background_choice == 'bgImage'  %}
      .{{name}} .baseModuleOverlay{ position: absolute; left: 0; top: 0; width: 100%; height: 100%; background-color:rgba({{ module.style.background_property.overlay_color.color|convert_rgb }},{{ module.style.background_property.overlay_color.opacity }}%); }
      {% endif %}
      /****  Overlay Start  *****/
      .{{name}} .baseModuleParent{position:relative; z-index:5}



      {# End Desktop Styling #}

      {# Tablet Styling #}
      @media(max-width:1300px){
        .{{name}}.baseModuleStyle{
           {{  module.style.spacing.tab_spacing.css }}
        } 
      }
      {# End Tablet Styling #}
      {# Mobile Styling #}
      @media(max-width:767px){
        .{{name}}.baseModuleStyle{
          {{ module.style.spacing.mobile_spacing.css  }}
        } 
      }
      
{#       {% end_scope_css %} #}
    </style>
  {% end_require_css %}
